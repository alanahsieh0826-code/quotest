<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>工程估價系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","PingFang TC",sans-serif;background:#ECEAE7;color:#1a1a1a;font-size:15px;line-height:1.5}

/* HEADER */
.app-header{background:#1C2B3A;padding:0 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:52px;gap:12px}
.app-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:.06em;display:flex;align-items:center;gap:10px}
.app-title span{font-size:11px;font-weight:400;color:#7A9BB8;letter-spacing:.06em;padding-left:10px;border-left:1px solid #2e4258}
.header-actions{display:flex;gap:8px}

/* BUTTONS */
.btn{padding:6px 16px;border-radius:5px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;border:none;transition:all .14s;white-space:nowrap;letter-spacing:.02em}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-accent{background:#D97706;color:#fff}
.btn-accent:hover{background:#B45309}
.btn-outline{background:#fff;border:1px solid #CCC9C3;color:#333}
.btn-outline:hover{background:#F5F2EE;border-color:#999}
.btn-blue{background:#1D4ED8;color:#fff}
.btn-blue:hover{background:#1E40AF}

/* COMPANY BAR */
.company-bar{background:#F0EDE8;border-bottom:2px solid #C8C4BC;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.co-info{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.co-name{font-size:17px;font-weight:700;color:#1C2B3A;letter-spacing:.02em}
.co-meta{font-size:14px;color:#444;display:flex;gap:16px;flex-wrap:wrap}
.co-edit-btn{padding:5px 13px;border:1px solid #B0ADA8;border-radius:5px;font-size:13px;cursor:pointer;background:#fff;color:#555;font-family:inherit;white-space:nowrap;font-weight:500}
.co-edit-btn:hover{background:#E8E5E0;color:#1C2B3A;border-color:#888}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:24px;width:440px;max-width:94vw;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.modal-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #eee}
.modal-grid{display:grid;gap:10px}
.modal-grid label{font-size:13px;color:#555;display:block;margin-bottom:3px;font-weight:600}
.modal-grid input{width:100%;padding:8px 10px;border:1px solid #DDD;border-radius:5px;font-size:14px;color:#1a1a1a;font-family:inherit;background:#FAFAF8}
.modal-grid input:focus{outline:none;border-color:#1D4ED8;background:#fff}
.modal-hint{font-size:13px;color:#999;margin-top:10px;background:#F8F6F3;padding:8px 10px;border-radius:5px;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* PAGE */
.page{max-width:1300px;margin:0 auto;padding:12px 14px}

/* INFO CARD */
.info-card{background:#fff;border:1px solid #D5D2CC;border-radius:7px;padding:10px 14px;margin-bottom:8px}
.info-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:700px){.info-fields{grid-template-columns:repeat(2,1fr)}}
.fg label{font-size:12px;color:#777;display:block;margin-bottom:2px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.fg input{width:100%;padding:5px 8px;border:1px solid #DEDAD5;border-radius:5px;font-size:14px;color:#1a1a1a;background:#FAFAF8;font-family:inherit}
.fg input:focus{outline:none;border-color:#1D4ED8;background:#fff}

/* TRADE TABS */
.tabs-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;align-items:center;background:#fff;border:1px solid #D5D2CC;border-radius:7px;padding:7px 10px}
.trade-tab{display:flex;align-items:center;gap:3px;padding:4px 12px;border:1px solid #D5D2CC;border-radius:4px;font-size:14px;cursor:pointer;background:#FAFAF8;color:#555;user-select:none;transition:all .12s;white-space:nowrap;font-weight:500}
.trade-tab:hover{border-color:#999;color:#1a1a1a;background:#F0EDE8}
.trade-tab.active{background:#1C2B3A;border-color:#1C2B3A;color:#fff;font-weight:700}
.tab-del{display:none;background:none;border:none;cursor:pointer;font-size:13px;color:#ff9999;padding:0 0 0 3px;line-height:1;font-family:inherit}
.trade-tab:hover .tab-del{display:inline}
.add-trade-btn{padding:4px 12px;border:1px dashed #BBBBBB;border-radius:4px;font-size:14px;cursor:pointer;background:transparent;color:#888;font-family:inherit;font-weight:500}
.add-trade-btn:hover{background:#F0EDE8;color:#333}
.add-trade-inline{display:flex;gap:5px;align-items:center}
.add-trade-inline input{padding:4px 9px;border:1px solid #BBB;border-radius:4px;font-size:14px;width:140px;font-family:inherit;color:#1a1a1a}
.add-trade-inline input:focus{outline:none;border-color:#1D4ED8}
.add-trade-inline .ok-btn{padding:4px 12px;border:none;border-radius:4px;font-size:13px;cursor:pointer;background:#1C2B3A;color:#fff;font-family:inherit;font-weight:600}
.add-trade-inline .cancel-btn{padding:4px 9px;border:1px solid #ddd;border-radius:4px;font-size:13px;cursor:pointer;background:#fff;color:#666;font-family:inherit}

/* LAYOUT */
.layout{display:grid;grid-template-columns:215px 1fr;gap:10px;align-items:start}
@media(max-width:640px){.layout{grid-template-columns:1fr}}

/* PICKER */
.picker-box{background:#fff;border:1px solid #D5D2CC;border-radius:7px;overflow:hidden;position:sticky;top:104px;max-height:calc(100vh - 116px);overflow-y:auto}
.picker-hd{padding:7px 12px;font-size:13px;font-weight:700;color:#fff;background:#1C2B3A;letter-spacing:.05em;position:sticky;top:0;z-index:5}
.cat-block{border-top:1px solid #E8E5E0}
.cat-label-row{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 3px 12px;background:#F0EDE8;border-top:1px solid #E2DED9}
.cat-name{font-size:13px;font-weight:700;color:#4a4a4a;letter-spacing:.03em}
.cat-del{background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;padding:0 2px;opacity:0;font-family:inherit}
.cat-label-row:hover .cat-del{opacity:1}
.cat-del:hover{color:#cc4444}
.pick-item{display:flex;align-items:center;gap:7px;padding:3px 10px 3px 12px;border-top:1px solid #EEEAE6;cursor:pointer}
.pick-item:hover{background:#F5F2EE}
.pick-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#1D4ED8;flex-shrink:0}
.pick-item span{font-size:14px;color:#222;line-height:1.35;flex:1}
.item-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:0 2px;opacity:0;font-family:inherit}
.pick-item:hover .item-del{opacity:1}
.item-del:hover{color:#cc4444}
.add-item-row{display:flex;gap:4px;padding:4px 8px 4px 12px;border-top:1px solid #EEEAE6;background:#FAF8F5}
.add-item-row input{flex:1;padding:3px 6px;border:1px solid #DEDAD5;border-radius:4px;font-size:13px;color:#1a1a1a;font-family:inherit}
.add-item-row input:focus{outline:none;border-color:#1D4ED8}
.add-item-row button{padding:3px 9px;border:1px solid #CCC9C3;border-radius:4px;font-size:13px;cursor:pointer;background:#fff;color:#444;font-family:inherit;font-weight:600}
.add-cat-row{display:flex;gap:4px;padding:5px 8px;border-top:1px solid #D5D2CC;background:#E8E5E0}
.add-cat-row input{flex:1;padding:3px 7px;border:1px solid #CCCAC5;border-radius:4px;font-size:13px;color:#1a1a1a;font-family:inherit}
.add-cat-row input:focus{outline:none;border-color:#1D4ED8}
.add-cat-row button{padding:3px 9px;border:1px solid #BBB9B4;border-radius:4px;font-size:13px;cursor:pointer;background:#fff;color:#333;font-family:inherit;font-weight:600;white-space:nowrap}
.add-cat-row button:hover{background:#f0ede8}

/* QUOTE TABLE */
.quote-box{background:#fff;border:1px solid #D5D2CC;border-radius:7px;overflow:hidden}
.quote-hd{padding:7px 14px;font-size:14px;font-weight:700;color:#fff;background:#1C2B3A;letter-spacing:.06em}
.empty-hint{padding:2rem;text-align:center;color:#aaa;font-size:15px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:6px 7px;text-align:center;font-size:13px;font-weight:700;color:#444;border-bottom:2px solid #D5D2CC;white-space:nowrap;background:#F5F2EE;letter-spacing:.03em}
td{padding:2px 3px;border-bottom:1px solid #EEEAE6;vertical-align:middle;overflow:hidden}
td input{width:100%;border:none;background:transparent;font-size:14px;color:#1a1a1a;outline:none;padding:3px 4px;font-family:inherit;border-radius:3px}
td input:focus{background:#EFF6FF}
.r input{text-align:right}
.no-cell{font-size:13px;color:#999;text-align:center;padding:0 3px;white-space:nowrap;font-weight:700}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:2px 5px;border-radius:3px;font-family:inherit}
.del-btn:hover{color:#cc4444;background:#ffeaea}
.trade-hd-row td{background:#1C2B3A;font-size:14px;font-weight:700;color:#fff;padding:5px 10px;letter-spacing:.05em}
.cat-hd-row td{font-size:13px;color:#555;background:#F0EDE8;padding:3px 10px 3px 20px;font-weight:700;letter-spacing:.03em;border-top:1px solid #E2DED9}
.subtotal-row td{font-size:14px;color:#1C2B3A;background:#EBF3FE;text-align:right;padding:5px 10px;font-weight:700;border-top:1.5px solid #C5D9F5}

/* GRAND TOTAL */
.grand-bar{display:flex;justify-content:flex-end;align-items:stretch;margin-top:8px;border-radius:7px;overflow:hidden;border:1px solid #C5D9F5}
.grand-label{font-size:15px;color:#555;padding:11px 20px;background:#EBF3FE;font-weight:600;letter-spacing:.03em;display:flex;align-items:center}
.grand-val{font-size:22px;font-weight:700;color:#1C2B3A;padding:11px 20px;background:#D4E8FB;letter-spacing:.02em;min-width:190px;text-align:right;display:flex;align-items:center;justify-content:flex-end}

/* SIGNATURE */
.sign-block{background:#fff;border:1px solid #D5D2CC;border-radius:7px;padding:14px 18px;margin-top:8px}
.sign-title{font-size:12px;font-weight:700;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid #EEEAE6}
.sign-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:600px){.sign-grid{grid-template-columns:1fr}}
.sign-item label{font-size:13px;color:#555;font-weight:700;display:block;margin-bottom:6px;letter-spacing:.03em}
.sign-line{border:none;border-bottom:1.5px solid #444;height:34px;width:100%;background:transparent;font-size:14px;font-family:inherit;color:#1a1a1a;outline:none;display:block;padding:0 4px}
.sign-sub{font-size:12px;color:#aaa;margin-top:3px}

/* ACTION ROW */
.action-row{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:10px;padding-bottom:20px}

/* PRINT */
@media print{
  body{background:#fff;font-size:13px}
  .app-header,.tabs-row,.picker-box,.action-row,.del-btn,.add-item-row,.add-cat-row,.tab-del,.item-del,.cat-del,.co-edit-btn,.modal-overlay{display:none!important}
  .layout{grid-template-columns:1fr!important}
  .page{padding:0 6px}
  .quote-box,.info-card,.sign-block{border:none;border-radius:0;box-shadow:none}
  .company-bar{padding:8px 14px;background:#F0EDE8!important;border-bottom:2px solid #C8C4BC!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .co-name{color:#1C2B3A!important}
  .co-meta{color:#444!important}
  .quote-hd,.trade-hd-row td{background:#222!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cat-hd-row td{background:#EEEAE6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .subtotal-row td{background:#E4EFF9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .grand-bar{border:1px solid #C5D9F5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .grand-label{background:#EBF3FE!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .grand-val{background:#D4E8FB!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{font-size:12px}
  td input{font-size:12px}
  .sign-block{margin-top:20px;border-top:1.5px solid #333;padding-top:14px}
  .info-card{padding:6px 0;border:none}
  .fg input{border:none;background:transparent;padding:0}
}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">工程估價系統 <span>QUOTATION SYSTEM</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="window.print()">🖨 列印 / PDF</button>
    <button class="btn btn-accent" onclick="doExcel()">📊 匯出 Excel</button>
  </div>
</div>

<div class="company-bar" id="companyBar">
  <div class="co-info">
    <div class="co-name" id="dispName">尚未設定公司名稱</div>
    <div class="co-meta" id="dispMeta"></div>
  </div>
  <button class="co-edit-btn" onclick="openModal()">⚙ 公司資料設定</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-title">⚙ 公司資料設定</div>
    <div class="modal-grid">
      <div><label>公司名稱</label><input id="cName" placeholder="例：誠信裝潢工程有限公司"/></div>
      <div><label>聯絡人</label><input id="cContact" placeholder="例：王大明"/></div>
      <div><label>聯絡電話</label><input id="cPhone" placeholder="例：02-1234-5678"/></div>
      <div><label>統一編號（選填）</label><input id="cTaxId" placeholder="例：12345678"/></div>
      <div><label>地址（選填）</label><input id="cAddr" placeholder="例：台北市大安區某路1號"/></div>
    </div>
    <div class="modal-hint">💾 資料儲存於瀏覽器，下次開啟自動載入。</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="saveCompany()">儲存</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="info-card">
    <div class="info-fields">
      <div class="fg"><label>案場名稱</label><input id="pName" placeholder="例：台北市大安路某案"/></div>
      <div class="fg"><label>業主姓名</label><input id="pClient"/></div>
      <div class="fg"><label>報價日期</label><input id="pDate" type="date"/></div>
      <div class="fg"><label>工期（天）</label><input id="pDays" type="number" placeholder="30"/></div>
    </div>
  </div>

  <div class="tabs-row" id="tradeTabWrap"></div>

  <div class="layout">
    <div class="picker-box" id="pickerBox"></div>
    <div>
      <div class="quote-box">
        <div class="quote-hd">▌ 報價明細</div>
        <div id="quoteBody"></div>
      </div>

      <div class="grand-bar">
        <span class="grand-label">估價總金額（合計）</span>
        <span class="grand-val" id="grandVal">NT$ 0</span>
      </div>

      <div class="sign-block">
        <div class="sign-title">Confirmation　確認簽名欄</div>
        <div class="sign-grid">
          <div class="sign-item">
            <label>業主確認簽名</label>
            <input class="sign-line" id="signClient" type="text"/>
            <div class="sign-sub">簽名　／　日期</div>
          </div>
          <div class="sign-item">
            <label>承包商簽章</label>
            <input class="sign-line" id="signContractor" type="text"/>
            <div class="sign-sub">簽名　／　日期</div>
          </div>
          <div class="sign-item">
            <label>特別說明事項</label>
            <input class="sign-line" id="signNote" type="text" placeholder="例：含稅 / 不含稅 / 付款方式"/>
            <div class="sign-sub">備註</div>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-outline" onclick="window.print()">🖨 列印 / PDF</button>
        <button class="btn btn-accent" onclick="doExcel()">📊 匯出 Excel</button>
      </div>
    </div>
  </div>
</div>

<script>
let catalog=[
  {trade:"水電工程",cats:[
    {cat:"電系工程",items:["配電盤更換新增管路","全室線路更換","室內空間迴路拆分規劃","新增廚房專用迴路","新增廁所三合一暖風機迴路","配合裝潢燈具配線","開關插座更換","開關插座移位或新增","廚房感知器安裝","新增地面插座","系統櫃新增插座"]},
    {cat:"衛浴工程",items:["台達電三合一暖風機 含安裝工資"]},
    {cat:"公共工程",items:["臨時電力及照明","水電事業廢棄物清運","五金另件"]}
  ]},
  {trade:"木作工程",cats:[
    {cat:"拆除工程",items:["全室木作拆除","木地板拆除清運"]},
    {cat:"輕隔間",items:["輕隔間（書房處）","輕隔間（主臥處）"]},
    {cat:"天花板",items:["矽酸鈣天花板","廁所塑膠天花板"]},
    {cat:"門",items:["房間門","廚房滑門"]}
  ]},
  {trade:"油漆工程",cats:[
    {cat:"天花板",items:["矽酸鈣天花板","牆壁矽酸鈣板"]},
    {cat:"牆面",items:["牆面批土油漆","門邊及門框噴漆","間接造明批土油漆"]}
  ]},
  {trade:"系統櫃工程",cats:[
    {cat:"客廳",items:["玄關系統收納鞋櫃","LED暖光鋁燈條","收納鞋槽變壓器","系統收納穿鞋櫃","穿鞋槽抽屜","8mm系統洞洞板","沙發側櫃","沙發側櫃LED暖光鋁燈條","沙發側櫃變壓器","系統電視吊櫃","電視吊櫃LED暖光鋁燈條","電視吊櫃變壓器","窗邊行李箱櫃","系統收納高櫃","茶鏡細鈦框對開玻璃門","收納高櫃LED暖光鋁燈條"]},
    {cat:"廚房",items:["系統上櫃","系統下櫃","抽屜配件","廚房檯面"]},
    {cat:"臥室",items:["主臥衣櫃","主臥床頭板","次臥衣櫃"]}
  ]},
  {trade:"冷氣空調工程",cats:[
    {cat:"工資類別",items:["銅管及訊號線","PVC排水配置","排水保溫","埋入式集風箱","埋入式機器吊掛工資","室外機安裝定位工資","WIFI控制器"]}
  ]},
  {trade:"泥作工程",cats:[
    {cat:"主臥廁所",items:["廁所牆面壁牆剷除 地板見底","牆面水泥砂漿粗底","防水（底*1壁*2地*3）","牆面貼磚30*60","地面貼磚30*30","大理石門檻含安裝","乾溼分離門檻含安裝","建材及廢棄物搬運工資","塑鋼門含安裝"]},
    {cat:"公共廁所",items:["廁所牆面壁牆剷除 地板見底","牆面水泥砂漿粗底","防水（底*1壁*2地*3）","牆面貼磚30*60","地面貼磚30*30"]}
  ]}
];

let activeTrade=0,showAddTrade=false,checked={},rowData={};
function key(ti,ci,ii){return ti+'_'+ci+'_'+ii;}
function fmt(v){return parseFloat(v)||0;}
function fmtM(n){return 'NT$ '+(Math.round(n)||0).toLocaleString();}

function initKeys(){
  catalog.forEach((t,ti)=>t.cats.forEach((c,ci)=>c.items.forEach((_,ii)=>{
    const k=key(ti,ci,ii);
    if(checked[k]===undefined)checked[k]=false;
    if(!rowData[k])rowData[k]={qty:'1',unit:'式',amount:'',note:''};
  })));
}
function tradeHasContent(ti){return catalog[ti].cats.some(c=>c.items.length>0);}

function renderTabs(){
  const wrap=document.getElementById('tradeTabWrap');wrap.innerHTML='';
  catalog.forEach((t,ti)=>{
    const tab=document.createElement('div');tab.className='trade-tab'+(ti===activeTrade?' active':'');
    const label=document.createElement('span');label.textContent=t.trade;
    label.onclick=()=>{activeTrade=ti;renderTabs();renderPicker();};
    tab.appendChild(label);
    if(!tradeHasContent(ti)){
      const del=document.createElement('button');del.className='tab-del';del.textContent='×';
      del.onclick=e=>{e.stopPropagation();catalog.splice(ti,1);if(activeTrade>=catalog.length)activeTrade=Math.max(0,catalog.length-1);initKeys();renderTabs();renderPicker();renderQuote();};
      tab.appendChild(del);
    }
    wrap.appendChild(tab);
  });
  if(!showAddTrade){
    const btn=document.createElement('button');btn.className='add-trade-btn';btn.textContent='＋ 新增工種';
    btn.onclick=()=>{showAddTrade=true;renderTabs();};wrap.appendChild(btn);
  } else {
    const inl=document.createElement('div');inl.className='add-trade-inline';
    const inp=document.createElement('input');inp.placeholder='工種名稱…';inp.id='newTradeInput';
    const ok=document.createElement('button');ok.className='ok-btn';ok.textContent='新增';
    ok.onclick=()=>{const v=inp.value.trim();if(v){catalog.push({trade:v,cats:[]});activeTrade=catalog.length-1;}showAddTrade=false;initKeys();renderTabs();renderPicker();renderQuote();};
    const cancel=document.createElement('button');cancel.className='cancel-btn';cancel.textContent='取消';
    cancel.onclick=()=>{showAddTrade=false;renderTabs();};
    inp.onkeydown=e=>{if(e.key==='Enter')ok.click();if(e.key==='Escape')cancel.click();};
    inl.appendChild(inp);inl.appendChild(ok);inl.appendChild(cancel);wrap.appendChild(inl);
    setTimeout(()=>{const el=document.getElementById('newTradeInput');if(el)el.focus();},50);
  }
}

function renderPicker(){
  const box=document.getElementById('pickerBox');box.innerHTML='';
  if(!catalog.length){box.innerHTML='<div style="padding:1rem;font-size:14px;color:#aaa">請先新增工種</div>';return;}
  const t=catalog[activeTrade];
  const hd=document.createElement('div');hd.className='picker-hd';hd.textContent='▌ '+t.trade;box.appendChild(hd);
  t.cats.forEach((c,ci)=>{
    const cb=document.createElement('div');cb.className='cat-block';
    const clr=document.createElement('div');clr.className='cat-label-row';
    const cn=document.createElement('span');cn.className='cat-name';cn.textContent=c.cat;
    const cdel=document.createElement('button');cdel.className='cat-del';cdel.textContent='× 刪除';
    cdel.onclick=()=>{if(c.items.length>0){alert('請先刪除「'+c.cat+'」下所有細項再刪除分類。');return;}t.cats.splice(ci,1);initKeys();renderPicker();renderQuote();};
    clr.appendChild(cn);clr.appendChild(cdel);cb.appendChild(clr);
    c.items.forEach((item,ii)=>{
      const k=key(activeTrade,ci,ii);
      const row=document.createElement('div');row.className='pick-item';
      const chk=document.createElement('input');chk.type='checkbox';chk.checked=!!checked[k];
      chk.onchange=e=>{checked[k]=e.target.checked;renderQuote();};
      const sp=document.createElement('span');sp.textContent=item;
      const idel=document.createElement('button');idel.className='item-del';idel.textContent='×';
      idel.onclick=()=>{if(checked[k]){alert('請先取消勾選「'+item+'」再刪除。');return;}c.items.splice(ii,1);delete checked[k];delete rowData[k];initKeys();renderPicker();renderQuote();};
      row.appendChild(chk);row.appendChild(sp);row.appendChild(idel);cb.appendChild(row);
    });
    const ai=document.createElement('div');ai.className='add-item-row';
    const ainp=document.createElement('input');ainp.placeholder='新增細項…';
    const abtn=document.createElement('button');abtn.textContent='＋';
    abtn.onclick=()=>{const v=ainp.value.trim();if(!v)return;c.items.push(v);initKeys();ainp.value='';renderPicker();renderQuote();};
    ainp.onkeydown=e=>{if(e.key==='Enter')abtn.click();};
    ai.appendChild(ainp);ai.appendChild(abtn);cb.appendChild(ai);box.appendChild(cb);
  });
  const acr=document.createElement('div');acr.className='add-cat-row';
  const acinp=document.createElement('input');acinp.placeholder='新增分類…';
  const acbtn=document.createElement('button');acbtn.textContent='新增分類';
  acbtn.onclick=()=>{const v=acinp.value.trim();if(!v)return;t.cats.push({cat:v,items:[]});initKeys();acinp.value='';renderPicker();renderQuote();};
  acinp.onkeydown=e=>{if(e.key==='Enter')acbtn.click();};
  acr.appendChild(acinp);acr.appendChild(acbtn);box.appendChild(acr);
}

function n2disp(v){const n=parseFloat(v)||0;return n>0?n.toLocaleString('zh-TW'):'';}

function renderQuote(){
  const body=document.getElementById('quoteBody');
  let hasAny=false;
  catalog.forEach((t,ti)=>t.cats.forEach((c,ci)=>c.items.forEach((_,ii)=>{if(checked[key(ti,ci,ii)])hasAny=true;})));
  if(!hasAny){body.innerHTML='<div class="empty-hint">從左側勾選施工細項加入報價</div>';document.getElementById('grandVal').textContent='NT$ 0';return;}
  const tbl=document.createElement('table');
  tbl.innerHTML=`<thead><tr>
    <th style="width:5%">編號</th>
    <th style="width:34%">施工項目</th>
    <th style="width:8%">數量</th>
    <th style="width:7%">單位</th>
    <th style="width:16%">金額</th>
    <th style="width:25%">備註</th>
    <th style="width:5%"></th>
  </tr></thead>`;
  const tbody=document.createElement('tbody');
  let grand=0;
  const chNo=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  let tradeNo=0;
  catalog.forEach((t,ti)=>{
    let tradeHas=false;
    t.cats.forEach((c,ci)=>c.items.forEach((_,ii)=>{if(checked[key(ti,ci,ii)])tradeHas=true;}));
    if(!tradeHas)return;
    const thRow=document.createElement('tr');thRow.className='trade-hd-row';
    const no=chNo[tradeNo]||String(tradeNo+1);tradeNo++;
    thRow.innerHTML=`<td style="text-align:center">${no}</td><td colspan="6">${t.trade}</td>`;
    tbody.appendChild(thRow);
    let tradeTotal=0,itemNo=1;
    t.cats.forEach((c,ci)=>{
      const sel=c.items.filter((_,ii)=>checked[key(ti,ci,ii)]);
      if(!sel.length)return;
      const chRow=document.createElement('tr');chRow.className='cat-hd-row';
      chRow.innerHTML=`<td></td><td colspan="6">${c.cat}</td>`;tbody.appendChild(chRow);
      c.items.forEach((item,ii)=>{
        const k=key(ti,ci,ii);if(!checked[k])return;
        const r=rowData[k];const amt=fmt(r.amount);
        tradeTotal+=amt;grand+=amt;const n=itemNo++;
        const tr=document.createElement('tr');
        const amtDisplay=n2disp(r.amount);
        tr.innerHTML=`
          <td class="no-cell">${n}</td>
          <td><span style="font-size:14px;line-height:1.35;display:block;padding:2px 4px">${item}</span></td>
          <td><input class="r" type="number" min="0" value="${r.qty}" oninput="ud(this,'${k}','qty')" style="text-align:right"/></td>
          <td><input value="${r.unit}" oninput="ud(this,'${k}','unit')" style="text-align:center"/></td>
          <td><input class="r" type="text" inputmode="numeric" value="${amtDisplay}" placeholder="0"
            onfocus="amtFocus(this,'${k}')"
            oninput="amtInput(this,'${k}')"
            onblur="amtBlur(this,'${k}')"
            style="text-align:right"/></td>
          <td><input value="${r.note}" oninput="ud(this,'${k}','note')"/></td>
          <td style="text-align:center"><button class="del-btn" onclick="unchk('${k}')">×</button></td>`;
        tbody.appendChild(tr);
      });
    });
    const stRow=document.createElement('tr');stRow.className='subtotal-row';
    stRow.innerHTML=`<td colspan="4" style="text-align:left;padding-left:10px">${t.trade}　小計</td><td colspan="3" id="st_${ti}">${fmtM(tradeTotal)}</td>`;
    tbody.appendChild(stRow);
  });
  tbl.appendChild(tbody);body.innerHTML='';body.appendChild(tbl);
  document.getElementById('grandVal').textContent=fmtM(grand);
}

function ud(el,k,f){rowData[k][f]=el.value;renderQuote();}
function unchk(k){checked[k]=false;renderPicker();renderQuote();}

// Amount field: store raw number, display with commas, only re-render on blur
function amtFocus(el,k){
  // show raw number for editing
  el.value=rowData[k].amount||'';
  el.select();
}
function amtInput(el,k){
  // strip non-numeric except decimal point, store raw
  const raw=el.value.replace(/[^0-9.]/g,'');
  el.value=raw;
  rowData[k].amount=raw;
  // update totals without rebuilding DOM
  updateTotals();
}
function amtBlur(el,k){
  const raw=el.value.replace(/[^0-9.]/g,'');
  rowData[k].amount=raw;
  const n=parseFloat(raw)||0;
  el.value=n>0?n.toLocaleString('zh-TW'):'';
  updateTotals();
}
function updateTotals(){
  let grand=0;
  const chNo=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  let tradeNo=0;
  catalog.forEach((t,ti)=>{
    let tradeTotal=0;
    t.cats.forEach((c,ci)=>c.items.forEach((_,ii)=>{
      const k=key(ti,ci,ii);
      if(checked[k]) tradeTotal+=fmt(rowData[k].amount);
    }));
    const hasTrade=t.cats.some((c,ci)=>c.items.some((_,ii)=>checked[key(ti,ci,ii)]));
    if(!hasTrade) return;
    const no=chNo[tradeNo]||String(tradeNo+1); tradeNo++;
    const stEl=document.getElementById('st_'+ti);
    if(stEl) stEl.textContent=fmtM(tradeTotal);
    grand+=tradeTotal;
  });
  document.getElementById('grandVal').textContent=fmtM(grand);
}

/* COMPANY */
const CKEY='quoteCompany';
let company={name:'',contact:'',phone:'',taxId:'',addr:''};
function loadCompany(){try{const s=localStorage.getItem(CKEY);if(s)company=JSON.parse(s);}catch(e){}renderCompanyBar();}
function saveCompany(){
  company.name=document.getElementById('cName').value.trim();
  company.contact=document.getElementById('cContact').value.trim();
  company.phone=document.getElementById('cPhone').value.trim();
  company.taxId=document.getElementById('cTaxId').value.trim();
  company.addr=document.getElementById('cAddr').value.trim();
  try{localStorage.setItem(CKEY,JSON.stringify(company));}catch(e){}
  renderCompanyBar();closeModal();
}
function renderCompanyBar(){
  document.getElementById('dispName').textContent=company.name||'尚未設定公司名稱';
  const parts=[];
  if(company.contact)parts.push('聯絡人：'+company.contact);
  if(company.phone)parts.push('電話：'+company.phone);
  if(company.taxId)parts.push('統編：'+company.taxId);
  if(company.addr)parts.push('地址：'+company.addr);
  const meta=document.getElementById('dispMeta');meta.innerHTML='';
  parts.forEach(p=>{const sp=document.createElement('span');sp.textContent=p;meta.appendChild(sp);});
}
function openModal(){
  document.getElementById('cName').value=company.name;
  document.getElementById('cContact').value=company.contact;
  document.getElementById('cPhone').value=company.phone;
  document.getElementById('cTaxId').value=company.taxId;
  document.getElementById('cAddr').value=company.addr;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function bgClose(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

/* EXCEL */
function doExcel(){
  const wb=XLSX.utils.book_new();
  const proj=document.getElementById('pName').value||'工程報價';
  const client=document.getElementById('pClient').value||'';
  const date=document.getElementById('pDate').value||'';
  const days=document.getElementById('pDays').value||'';
  const signNote=document.getElementById('signNote').value||'';
  const rows=[['工程估價單']];
  if(company.name)rows.push([company.name]);
  const mp=[];
  if(company.contact)mp.push('聯絡人：'+company.contact);
  if(company.phone)mp.push('電話：'+company.phone);
  if(company.taxId)mp.push('統編：'+company.taxId);
  if(mp.length)rows.push([mp.join('　　')]);
  if(company.addr)rows.push(['地址：'+company.addr]);
  rows.push([]);
  rows.push(['案場名稱',proj,'','業主',client]);
  rows.push(['報價日期',date,'','工期',days?days+'天':'']);
  if(signNote)rows.push(['備註說明',signNote]);
  rows.push([]);
  rows.push(['編號','工種','分類','施工項目','數量','單位','金額','備註']);
  let grand=0;
  const chNo=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  let tradeNo=0;
  catalog.forEach((t,ti)=>{
    let tradeTotal=0;
    const hasAny=t.cats.some((c,ci)=>c.items.some((_,ii)=>checked[key(ti,ci,ii)]));
    if(!hasAny)return;
    const tNo=chNo[tradeNo]||String(tradeNo+1);tradeNo++;
    let itemNo=1;
    t.cats.forEach((c,ci)=>{
      c.items.forEach((item,ii)=>{
        const k=key(ti,ci,ii);if(!checked[k])return;
        const r=rowData[k];const amt=fmt(r.amount);
        tradeTotal+=amt;grand+=amt;
        rows.push([itemNo++,t.trade,c.cat,item,fmt(r.qty),r.unit,Math.round(amt)||'',r.note||'']);
      });
    });
    rows.push(['','','','',t.trade+' 小計','','NT$ '+Math.round(tradeTotal).toLocaleString(),'']);rows.push([]);
  });
  rows.push(['','','','','估價總金額','','NT$ '+Math.round(grand).toLocaleString(),'']);
  rows.push([]);rows.push([]);
  rows.push(['業主確認簽名','','','承包商簽章','','','備註','']);
  rows.push(['','','','','','','','']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:6},{wch:12},{wch:12},{wch:28},{wch:7},{wch:6},{wch:15},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'估價單');
  XLSX.writeFile(wb,(proj||'工程')+'_估價單.xlsx');
}

document.getElementById('pDate').value=new Date().toISOString().split('T')[0];
loadCompany();initKeys();renderTabs();renderPicker();renderQuote();
</script>
